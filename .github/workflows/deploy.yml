name: Deploy xyzw to Tencent Cloud

on:
  push:
    branches: [ "main" ] # 只有 main 分支收到推送时才触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. 在 GitHub 虚拟机上完成前端编译
      - name: Install & Build Frontend
        run: |
          npm install
          npm run build

      # 2. 登录腾讯云镜像仓库
      - name: Login to TCR
        run: |
          echo "${{ secrets.TCR_PWD }}" | docker login ccr.ccs.tencentyun.com --username ${{ secrets.TCR_USER }} --password-stdin

      # 3. 构建并推送两个镜像
      # 注意：这里会自动识别你 docker-compose.yml 里的 image 名字和 dockerfile 路径
      - name: Build and Push Images
        run: |
          docker compose build
          docker push ccr.ccs.tencentyun.com/xyzw/zyzwapp:web
          docker push ccr.ccs.tencentyun.com/xyzw/zyzwapp:scheduler

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # 4. SSH 登录你的新服务器，执行拉取和重启
      - name: Remote SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: 106.53.19.144
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /srv/xyzw
            # 登录仓库确保有权限
            sudo docker login ccr.ccs.tencentyun.com --username ${{ secrets.TCR_USER }} --password "${{ secrets.TCR_PWD }}"
            # 拉取新镜像并启动
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans